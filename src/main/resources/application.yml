server:
  port: ${PORT:8080}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}   # ← BURAYA EKLE
  datasource:
    driver-class-name: org.postgresql.Driver
    url:      ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kasadatabase}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        type:
          json_format_mapper: org.hibernate.type.format.jackson.JacksonJsonFormatMapper

kasadeneme3:
  jwt:
    secret-key: ${KASADENEME3_JWT_SECRET_KEY:DEV_ONLY_CHANGE_IN_PRODUCTION_MIN32CH}
    issuer:     ${KASADENEME3_JWT_ISSUER:kasapi}

  cors:
    allowed-origins: ${KASADENEME3_CORS_ALLOWED_ORIGINS:http://localhost:5500,http://127.0.0.1:5500}

  swagger:
    enabled: ${KASADENEME3_SWAGGER_ENABLED:true}